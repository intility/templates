name: Publish dotnet Templates

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    # only publish when dispatched against a release tag, never a branch
    if: startsWith(github.ref, 'refs/tags/dotnet-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "9.0.x"

      - name: Pack
        run: |
          cd dotnet
          dotnet pack -c Release

      # Get a short-lived NuGet API key
      - name: NuGet login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish
        run: dotnet nuget push */bin/Release/*.nupkg -k "${{ steps.login.outputs.NUGET_API_KEY }}" -s https://api.nuget.org/v3/index.json
