apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: __CONTAINER_REPOSITORY__
  annotations:
    route.openshift.io/termination: edge
  labels:
    ingress-tenant: aa
spec:
  rules:
    - host: __CONTAINER_REPOSITORY__.apps.int.intility.no
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: __CONTAINER_REPOSITORY__
                port:
                  number: 8080
