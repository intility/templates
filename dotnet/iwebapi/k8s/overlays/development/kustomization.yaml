apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

nameSuffix: -dev

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/part-of: __CONTAINER_REPOSITORY__-dev

replicas:
  - name: __CONTAINER_REPOSITORY__
    count: 2

configMapGenerator:
  - name: __CONTAINER_REPOSITORY__-config
    literals:
      - ASPNETCORE_ENVIRONMENT=Development
