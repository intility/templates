apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

nameSuffix: -prod

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/part-of: __CONTAINER_REPOSITORY__-prod

patches:
  - path: deployment-patch.yaml
  - path: pdb-patch.yaml

configMapGenerator:
  - name: __CONTAINER_REPOSITORY__-config
    literals:
      - ASPNETCORE_ENVIRONMENT=Production

# x-release-please-start-version
images:
  - name: __CONTAINER_REPOSITORY__
    newName: ghcr.io/intility/__CONTAINER_REPOSITORY__
    newTag: 1.0.0
# x-release-please-end
