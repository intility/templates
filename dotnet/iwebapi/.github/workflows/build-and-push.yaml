name: build, test and publish

on:
  push:
    tags:
      - "*"
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
      artifact-metadata: write
    uses: intility/reusable-dotnet/.github/workflows/dotnet.yaml@b00ef8311a33005eb8d342b1a63e3ca577041fb1 # v1.4.0
    with:
      docker: ${{ github.event_name != 'pull_request' }}
      locked-mode: true
