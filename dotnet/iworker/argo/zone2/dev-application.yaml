apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: __CONTAINER_REPOSITORY__-dev
  annotations:
    argocd-image-updater.argoproj.io/image-list: ghcr.io/intility/__CONTAINER_REPOSITORY__:main,
    argocd-image-updater.argoproj.io/update-strategy: digest
    argocd-image-updater.argoproj.io/force-update: "true"
spec:
  project: __ARGO_PROJECT__
  destination:
    namespace: __OPENSHIFT_NAMESPACE__
    server: https://kubernetes.default.svc
  # syncPolicy:
  #   automated: {}
  source:
    repoURL: __GITHUB_REPO_URL__
    targetRevision: HEAD
    path: k8s/overlays/dev
