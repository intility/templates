apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: __CONTAINER_REPOSITORY__-prod
spec:
  project: __ARGO_PROJECT__
  destination:
    namespace: __OPENSHIFT_NAMESPACE__
    server: https://kubernetes.default.svc
  source:
    repoURL: __GITHUB_REPO_URL__
    targetRevision: HEAD
    path: k8s/overlays/production
