apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

#if (!cronJob)
components:
  - ../../components/high-availability
#endif

nameSuffix: -prod

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/part-of: __CONTAINER_REPOSITORY__-prod

patches:
  #if (cronJob)
  - path: cronjob-patch.yaml
  #else
  - path: deployment-patch.yaml
  #endif

configMapGenerator:
  - name: __CONTAINER_REPOSITORY__-config
    literals:
      - DOTNET_ENVIRONMENT=Production

# x-release-please-start-version
images:
  - name: __CONTAINER_REPOSITORY__
    newName: ghcr.io/intility/__CONTAINER_REPOSITORY__
    newTag: 1.0.0
# x-release-please-end
